<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Quicksand:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Baloo+2:wght@700;800&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="manual.css">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#fdfdff;width:816px;height:1056px;}
.page{position:static!important;display:block!important;width:816px!important;height:1056px!important;box-shadow:none!important;}
</style>
</head>
<body>
<div class="page">
  <img class="kh-badge" src="assets/kinsman-logo.png" alt="Kinsman Health Center" style="width:88px;">
  <h1 class="gl-title">GROCERY LIST</h1>
  <div class="gl-tipsbar">
    <div class="tab">TIPS FOR SUCCESS</div>
    <div class="tips">FOCUS ON SHOPPING THE PERIMETER<br>LIMIT BUYING TRIGGER FOODS<br>SHOP ON A FULL STOMACH AND WITH A FOCUS</div>
  </div>
  <div class="gl-grid" id="glgrid"></div>
  <span class="pageno right"></span>
  <script>
  var gl=document.getElementById('glgrid');
  var cats=['PRODUCE','FROZEN','DELI','MEAT & FISH','DAIRY','BEVERAGES','PANTRY','BAKERY','OTHER'];
  cats.forEach(function(cat){var p=document.createElement('div');p.className='gl-panel';var lines='';for(var k=0;k<9;k++)lines+='<div class="l"></div>';p.innerHTML='<h4>'+cat+'</h4><div class="lines">'+lines+'</div>';gl.appendChild(p);});
  </script>
</div>
</body>
</html>
